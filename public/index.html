<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a1a" />
    <meta name="description" content="Survival Island - 2D Survival Tamagotchi Game" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Survival Island" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Survival Island</title>
    <style>
      /* Lade-Bildschirm bevor React lädt */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100dvh;
        height: 100vh; /* Fallback */
        background-color: #0a0a1a;
        color: #fff;
        font-family: sans-serif;
      }
      #root:empty::after {
        content: 'Survival Island wird geladen...';
        font-size: 18px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <noscript>Du benötigst JavaScript um dieses Spiel zu spielen.</noscript>
    <div id="root"></div>
    <script>
      // Service Worker registrieren + automatisch Updates laden
      // Robust für installierte Desktop-PWA (kein manuelles Reload möglich)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          var refreshing = false;

          // 1) Controller-Wechsel erkennen: Wenn ein NEUER SW die Kontrolle übernimmt → Reload
          //    ABER: Nicht während der App-Initialisierung (sonst Endlos-Reload)
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            if (refreshing) return;
            if (!window.__appReady) {
              console.log('[PWA] SW-Wechsel während Laden — warte...');
              setTimeout(function() {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
              }, 8000);
              return;
            }
            refreshing = true;
            console.log('[PWA] Neuer Service Worker aktiv — lade neu...');
            window.location.reload();
          });

          // 2) Nachrichten vom SW empfangen (z.B. SW_UPDATED)
          navigator.serviceWorker.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'SW_UPDATED') {
              console.log('[PWA] SW Update-Nachricht erhalten, Version:', event.data.version);
              // Reload passiert bereits über controllerchange
            }
          });

          // 3) Service Worker registrieren
          navigator.serviceWorker.register('%PUBLIC_URL%/sw.js', {
            // updateViaCache: 'none' → Browser prüft IMMER den Server für sw.js
            // Verhindert dass GitHub Pages Cache-Header die sw.js veraltert servieren
            updateViaCache: 'none'
          })
            .then(function(reg) {
              console.log('[PWA] SW registriert:', reg.scope);

              // Alle 30 Sekunden nach Updates prüfen (wichtig für Desktop-PWA!)
              setInterval(function() {
                reg.update().catch(function() {});
              }, 30000);

              // Wenn ein neuer SW gefunden wird
              reg.addEventListener('updatefound', function() {
                var newWorker = reg.installing;
                if (!newWorker) return;
                console.log('[PWA] Neuer SW wird installiert...');

                newWorker.addEventListener('statechange', function() {
                  console.log('[PWA] Neuer SW State:', newWorker.state);
                  // Wenn der neue SW installed ist und auf Aktivierung wartet
                  if (newWorker.state === 'installed') {
                    if (navigator.serviceWorker.controller) {
                      // Es gibt einen alten SW → Update verfügbar!
                      // skipWaiting wurde bereits in sw.js aufgerufen,
                      // aber sicherheitshalber auch von hier triggern
                      console.log('[PWA] Update verfügbar — aktiviere neuen SW...');
                      newWorker.postMessage('skipWaiting');
                    } else {
                      // Erstinstallation, kein Reload nötig
                      console.log('[PWA] Erstinstallation abgeschlossen');
                    }
                  }
                });
              });

              // Falls bereits ein wartender SW existiert (z.B. von vorherigem Check)
              if (reg.waiting) {
                console.log('[PWA] Wartender SW gefunden — aktiviere...');
                reg.waiting.postMessage('skipWaiting');
              }
            })
            .catch(function(err) { console.log('[PWA] SW Fehler:', err); });
        });
      }
    </script>
  </body>
</html>
