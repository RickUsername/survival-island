<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a1a" />
    <meta name="description" content="Survival Island - 2D Survival Tamagotchi Game" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Survival Island" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Survival Island</title>
    <style>
      /* Lade-Bildschirm bevor React lädt */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        background-color: #0a0a1a;
        color: #fff;
        font-family: sans-serif;
      }
      #root:empty::after {
        content: 'Survival Island wird geladen...';
        font-size: 18px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <noscript>Du benötigst JavaScript um dieses Spiel zu spielen.</noscript>
    <div id="root"></div>
    <script>
      // Service Worker registrieren
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('%PUBLIC_URL%/sw.js')
            .then(reg => console.log('SW registriert:', reg.scope))
            .catch(err => console.log('SW Fehler:', err));
        });
      }
    </script>
  </body>
</html>
